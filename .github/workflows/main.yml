name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Android App
        run: |
          # সব ডিপেন্ডেন্সি ইনস্টল করা
          npm install --legacy-peer-deps
          
          # ক্যাপাসিটর কনফিগ নিশ্চিত করা (www ফোল্ডার থেকে রুটে কপি)
          [ -f "www/capacitor.config.json" ] && cp www/capacitor.config.json .
          
          # অ্যান্ড্রয়েড ফোল্ডার নতুন করে তৈরি করা
          npx cap add android
          npx cap sync
          
          # বিল্ড করা
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
